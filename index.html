<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dental Implant Patient Record</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFF8F0">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
:root{
  --primary:#F0C040;
  --primary-text:#1A1A1A;
  --bg:#FFF8F0;
  --card:#FFFFFF;
  --text:#1A1A1A;
  --muted:#8A8A8A;
  --danger:#E85D4E;
  --warn:#F09A2E;
  --ok:#5BBF7A;
  --border:#E0D8D0;
  --bold:#2B2B2B;
  --header-bg:#FFF8F0;
  --shadow:none;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Sarabun",-apple-system,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:76px;
  -webkit-tap-highlight-color:transparent;
}
header{
  background:var(--header-bg);
  color:var(--text);
  padding:14px 18px;
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2.5px solid var(--bold);
}
header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.2px;}
header h1 span{color:#E85D4E;}
header .sub{font-size:11px;color:var(--muted);margin-top:2px;}
main{padding:14px;max-width:680px;margin:0 auto;}
.card{
  background:var(--card);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  border:2.5px solid var(--bold);
}
.card h3{margin:0 0 10px;font-size:15px;font-weight:700;}
.summary-row{display:flex;gap:8px;margin-bottom:12px;}
.summary-box{
  flex:1;
  background:var(--card);
  border-radius:18px;
  padding:14px 8px;
  text-align:center;
  border:2.5px solid var(--bold);
}
.summary-box .num{font-size:24px;font-weight:700;}
.summary-box .lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.summary-box.overdue{background:#FFF0EE;}
.summary-box.overdue .num{color:var(--danger);}
.summary-box.today{background:#FFF8E8;}
.summary-box.today .num{color:#C07800;}
.summary-box.week{background:#EEF4FF;}
.summary-box.week .num{color:#3060C0;}
.fu-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:11px 0;
  border-bottom:1.5px solid var(--border);
  gap:8px;
}
.fu-item:last-child{border-bottom:none;}
.fu-info{flex:1;min-width:0;}
.fu-info .name{font-weight:700;font-size:14px;}
.fu-info .meta{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
.badge{
  display:inline-block;
  font-size:11px;
  padding:3px 9px;
  border-radius:999px;
  font-weight:700;
  white-space:nowrap;
  border:1.5px solid currentColor;
}
.badge.overdue{background:#FFF0EE;color:var(--danger);}
.badge.today{background:#FFF8E8;color:#C07800;}
.badge.week{background:#EEF4FF;color:#3060C0;}
.badge.later{background:#F5F5F5;color:var(--muted);}
.badge.done{background:#EEFAF3;color:var(--ok);}
.fu-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.btn{
  border:2px solid var(--bold);
  border-radius:999px;
  padding:9px 18px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  background:var(--primary);
  color:var(--primary-text);
  font-family:inherit;
  transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(.96);opacity:.85;}
.btn.secondary{background:#F5F0E8;color:var(--text);border-color:var(--bold);}
.btn.small{padding:6px 12px;font-size:12px;}
.btn.danger{background:#FFF0EE;color:var(--danger);border-color:var(--danger);}
.btn.ghost{background:transparent;color:var(--text);padding:5px 8px;font-weight:600;border:none;}
.btn.block{width:100%;margin-top:8px;}
.fab{
  position:fixed;
  bottom:84px;right:18px;
  width:56px;height:56px;
  border-radius:50%;
  background:var(--primary);
  color:var(--primary-text);
  font-size:28px;
  border:2.5px solid var(--bold);
  z-index:20;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  cursor:pointer;
  transition:transform .1s;
}
.fab:active{transform:scale(.92);}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:2.5px solid var(--bold);
  display:flex;
  z-index:15;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav button{
  flex:1;
  background:none;border:none;
  padding:10px 4px 8px;
  font-size:11px;
  color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:inherit;
  cursor:pointer;
  position:relative;
}
.bottom-nav button.active{color:var(--text);font-weight:700;}
.bottom-nav button.active::after{
  content:'';
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;
  background:var(--primary);
  border-radius:0 0 4px 4px;
}
.bottom-nav .icon{font-size:20px;}
input,select,textarea{
  width:100%;
  padding:11px 12px;
  border:2px solid var(--border);
  border-radius:12px;
  font-size:14px;
  font-family:inherit;
  background:#FFFDF9;
  color:var(--text);
  transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bold);background:#fff;}
label{font-size:13px;font-weight:700;display:block;margin:10px 0 4px;color:var(--text);}
.row2{display:flex;gap:8px;}
.row2 > div{flex:1;}
.search-box{margin-bottom:12px;}
.patient-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 0;border-bottom:1.5px solid var(--border);
  cursor:pointer;
}
.patient-item:last-child{border-bottom:none;}
.patient-item .name{font-weight:700;font-size:15px;}
.patient-item .meta{font-size:12px;color:var(--muted);margin-top:3px;}
.empty{text-align:center;color:var(--muted);padding:32px 10px;font-size:14px;}
.modal-overlay{
  position:fixed;inset:0;background:rgba(43,43,43,.45);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:50;
}
.modal{
  background:#fff;
  border-radius:24px 24px 0 0;
  border-top:2.5px solid var(--bold);
  border-left:2.5px solid var(--bold);
  border-right:2.5px solid var(--bold);
  width:100%;max-width:680px;
  max-height:90vh;overflow-y:auto;
  padding:20px 18px;
  animation:slideup .2s ease-out;
}
@keyframes slideup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal h2{margin:0 0 14px;font-size:18px;font-weight:700;}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:#F5F0E8;border:2px solid var(--bold);font-size:16px;color:var(--text);
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-weight:700;
}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{
  border:2px solid var(--bold);
  background:#F5F0E8;
  border-radius:999px;
  padding:6px 14px;
  font-size:12px;
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
}
.chip.active{background:var(--primary);color:var(--primary-text);border-color:var(--bold);}
.section-title{font-size:11px;font-weight:700;color:var(--muted);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.8px;}
.case-block{border:2px solid var(--bold);border-radius:16px;padding:12px;margin-bottom:10px;background:#FFFDF9;}
.case-block h4{margin:0 0 6px;font-size:14px;font-weight:700;}
.spec{font-size:12px;color:var(--muted);line-height:1.6;}
hr{border:none;border-top:1.5px solid var(--border);margin:14px 0;}
.history-text{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.7;}
.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--bold);color:#fff;padding:10px 20px;border-radius:999px;
  font-size:13px;font-weight:700;z-index:60;opacity:0;transition:opacity .2s;
  white-space:nowrap;border:2px solid #fff;
}
.toast.show{opacity:1;}
.link-btn{background:none;border:none;color:var(--text);font-size:13px;font-weight:700;padding:4px 0;cursor:pointer;font-family:inherit;}
/* X-ray grid */
.xray-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.xray-thumb{
  aspect-ratio:1;border-radius:12px;overflow:hidden;
  background:#F5F0E8;position:relative;cursor:pointer;
  border:2px solid var(--bold);
}
.xray-thumb img{width:100%;height:100%;object-fit:cover;}
.xray-thumb .xray-del{
  position:absolute;top:4px;right:4px;
  background:var(--bold);color:#fff;border:none;
  border-radius:50%;width:22px;height:22px;font-size:12px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.xray-thumb .xray-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.xray-upload-btn{
  aspect-ratio:1;border-radius:12px;
  border:2.5px dashed var(--bold);
  background:#FFFDF9;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:4px;color:var(--muted);font-size:11px;font-weight:700;
}
.xray-upload-btn .icon{font-size:24px;}
</style>
</head>

  <div>

</nav>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

const FU_TYPES = [
  'Extraction / Socket check',
  'Pre-implant assessment',
  'Suture removal / Wound check',
  'Stage 2 uncovery',
  'Impression',

  'Other'
];
const BRAND_SUGGEST = ['Straumann','Nobel Biocare','Osstem','Dentium','MegaGen AnyRidge','Astra Tech','Zimmer Biomet','BioHorizons','Neodent','Implant Direct'];
const BONE_GRAFT_SUGGEST = ['Bio-Oss','Bio-Oss Collagen','Allograft','Autograft','Cerasorb','OCS-B','Not used'];
const MEMBRANE_SUGGEST = ['Bio-Gide','OsseoGuard','Collagen membrane','d-PTFE','Titanium mesh','Not used'];
const ABUTMENT_TYPE_SUGGEST = ['Stock Abutment','Custom Abutment (CAD/CAM)','Ti-base','Screw-retained','Cement-retained','Multi-unit Abutment','Healing Abutment'];
const CROWN_MATERIAL_SUGGEST = ['Zirconia','PFM (Porcelain Fused to Metal)','E-max (Lithium Disilicate)','Full Ceramic','Acrylic (Temporary)','Composite'];

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const data = JSON.parse(raw);
      migrateCases(data);
      return data;
    }
  }catch(e){}
  return {patients:[], cases:[], followups:[], clinics:[], brands:[], labNames:[]};
}
function migrateDB(data){
  if(!data.brands) data.brands=[];
  if(!data.labNames) data.labNames=[];
  if(!data.clinics) data.clinics=[];
}
function migrateCases(data){
  migrateDB(data);
  (data.cases||[]).forEach(c=>{
    if(!c.implants){
      c.implants = [{
        tooth: c.tooth||'',
        brand: c.brand||'',
        diameter: c.diameter||'',
        length: c.length||'',
        material: c.material||'',
        abutmentMaterial: c.abutmentMaterial||'',
        boneGraft: '',
        membrane: ''
      }];
      delete c.tooth; delete c.brand; delete c.diameter; delete c.length; delete c.material; delete c.abutmentMaterial;
    }
    (c.implants||[]).forEach(im=>{
      if(!im.surgeryDate) im.surgeryDate = c.surgeryDate || '';
      if(!im.xrays) im.xrays = [];
    });
  });
  (data.patients||[]).forEach(p=>{
    if(p.clinic===undefined) p.clinic='';
    if(!p.xrays) p.xrays=[];
  });
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
}
let DB = loadData();

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* ================= HELPERS ================= */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(iso){
  if(!iso) return '-';
  const [y,m,d] = iso.split('-');
  const be = parseInt(y,10)+543;
  return `${d}/${m}/${y} (BE ${be})`;
}
function fmtDateShort(iso){
  if(!iso) return '-';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function daysDiff(iso){
  const today = new Date(todayStr());
  const due = new Date(iso);
  return Math.round((due-today)/86400000);
}
function getPatient(id){ return DB.patients.find(p=>p.id===id); }
function getCase(id){ return DB.cases.find(c=>c.id===id); }
function casesForPatient(pid){ return DB.cases.filter(c=>c.patientId===pid); }
function followupsForCase(cid){ return DB.followups.filter(f=>f.caseId===cid).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)); }
function caseSurgeryDate(c){
  const dates = (c.implants||[]).map(im=>im.surgeryDate).filter(Boolean).sort();
  if(dates.length) return dates[dates.length-1];
  // Fall back to extractionDate or plannedImplantDate for pre-stage cases
  const extDates = (c.implants||[]).map(im=>im.extractionDate||im.plannedImplantDate||'').filter(Boolean).sort();
  return extDates.length ? extDates[extDates.length-1] : (c.surgeryDate || '');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const pending = DB.followups.filter(f=>f.status!=='done');
  pending.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  const overdue = pending.filter(f=>daysDiff(f.dueDate)<0).length;
  const today = pending.filter(f=>daysDiff(f.dueDate)===0).length;
  const week = pending.filter(f=>{const d=daysDiff(f.dueDate); return d>0 && d<=7;}).length;

  let html = `
  <div class="summary-row">
    <div class="summary-box overdue"><div class="num">${overdue}</div><div class="lbl">Overdue</div></div>
    <div class="summary-box today"><div class="num">${today}</div><div class="lbl">Today</div></div>
    <div class="summary-box week"><div class="num">${week}</div><div class="lbl">Within 7 days</div></div>
  </div>
  <div class="card">
    <h3>${ico('calendar',18)} Pending Appointments / Follow-up</h3>`;

  if(pending.length===0){
    html += `<div class="empty">No pending appointments<br>Tap ＋ to add a new implant case</div>`;
  }else{
    pending.forEach(f=>{
      const c = getCase(f.caseId);
      const p = c ? getPatient(c.patientId) : null;
      const d = daysDiff(f.dueDate);
      let badgeClass='later', badgeText=`in ${d} days`;
      if(d<0){badgeClass='overdue'; badgeText=`${-d} days overdue`;}
      else if(d===0){badgeClass='today'; badgeText='Today';}
      else if(d<=7){badgeClass='week'; badgeText=`in ${d} days`;}
      const typeLabel = escapeHtml(f.type==='Other' && f.customType ? f.customType : f.type);
      const teethLabel = c ? (c.implants||[]).map(im=>im.tooth).filter(Boolean).join(', ') : '';
      html += `
      <div class="fu-item">
        <div class="fu-info" onclick="goToPatient('${p?p.id:''}')">
          <div class="name">${p?escapeHtml(p.name):'(Patient not found)'} ${c?`<span style="color:var(--muted);font-weight:400;">· ${escapeHtml(c.clinic||'')}</span>`:''}</div>
          <div class="meta">${typeLabel} · ${teethLabel?('Tooth '+escapeHtml(teethLabel)):''}</div>
          <div class="meta">📅 ${fmtDateShort(f.dueDate)} <span class="badge ${badgeClass}" style="margin-left:6px;">${badgeText}</span></div>
        </div>
        <div class="fu-actions">
          <button class="btn small" onclick="markDone('${f.id}')">Done</button>
          <button class="btn small secondary" onclick="rescheduleFU('${f.id}')">Reschedule</button>
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  const done = DB.followups.filter(f=>f.status==='done').sort((a,b)=>b.doneDate.localeCompare(a.doneDate)).slice(0,5);
  if(done.length){
    html += `<div class="card"><h3>${ico('check',18)} Recently Completed</h3>`;
    done.forEach(f=>{
      const c = getCase(f.caseId);
      const p = c ? getPatient(c.patientId) : null;
      const typeLabel = escapeHtml(f.type==='Other' && f.customType ? f.customType : f.type);
      html += `<div class="fu-item">
        <div class="fu-info">
          <div class="name">${p?escapeHtml(p.name):'-'}</div>
          <div class="meta">${typeLabel} · Completed on ${fmtDateShort(f.doneDate)}</div>
        </div>
        <span class="badge done">Done</span>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function goToPatient(pid){
  if(!pid) return;
  setView('patientDetail', pid);
}
function markDone(fid){
  const f = DB.followups.find(x=>x.id===fid);
  if(!f) return;
  f.status='done';
  f.doneDate = todayStr();
  saveData();
  render();
  showToast('Marked as done');
}
function rescheduleFU(fid){
  const f = DB.followups.find(x=>x.id===fid);
  if(!f) return;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Reschedule</h2>
    <label>New appointment date</label>
    <input type="date" id="rescheduleDate" value="${f.dueDate}">
    <button class="btn block" onclick="saveReschedule('${fid}')">Save</button>
  `);
}
function saveReschedule(fid){
  const f = DB.followups.find(x=>x.id===fid);
  const val = document.getElementById('rescheduleDate').value;
  if(!val){showToast('Please select a date'); return;}
  f.dueDate = val;
  saveData();
  closeModal();
  render();
  showToast('Appointment rescheduled');
}

/* ================= PATIENTS LIST ================= */
function renderPatients(){
  let html = `
  <div class="search-box">
    <input type="text" id="patientSearch" placeholder="🔍 Search name / HN / clinic" oninput="filterPatients(this.value)">
  </div>
  <div class="card" id="patientListCard">
    ${patientListHtml('')}
  </div>
  <button class="btn block" onclick="openPatientForm()">+ Add New Patient</button>
  `;
  return html;
}
function patientListHtml(query){
  query = (query||'').trim().toLowerCase();
  let list = DB.patients.slice().sort((a,b)=>a.name.localeCompare(b.name,'th'));
  if(query){
    list = list.filter(p=>
      (p.name||'').toLowerCase().includes(query) ||
      (p.hn||'').toLowerCase().includes(query) ||
      casesForPatient(p.id).some(c=>(c.clinic||'').toLowerCase().includes(query))
    );
  }
  if(list.length===0) return `<div class="empty">No patients found</div>`;
  return list.map(p=>{
    const cases = casesForPatient(p.id);
    const clinics = [...new Set(cases.map(c=>c.clinic).filter(Boolean))];
    const fus = DB.followups.filter(f=>cases.some(c=>c.id===f.caseId) && f.status!=='done').sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    let nextFu = fus[0] ? `Next appt: ${fmtDateShort(fus[0].dueDate)}` : 'No pending appts';
    return `<div class="patient-item" onclick="goToPatient('${p.id}')">
      <div>
        <div class="name">${escapeHtml(p.name)}${p.hn?` <span style="color:var(--muted);font-weight:400;font-size:12px;">(HN: ${escapeHtml(p.hn)})</span>`:''}</div>
        <div class="meta">${escapeHtml(clinics.join(', '))||'-'} · ${cases.length} cases · ${nextFu}</div>
      </div>
      <span style="color:var(--muted);">›</span>
    </div>`;
  }).join('');
}
function filterPatients(q){
  document.getElementById('patientListCard').innerHTML = patientListHtml(q);
}

            ${boneMem?`<br>${boneMem}`:''}

        ${fus.length===0?'<div class="empty" style="padding:10px;">No appointments</div>':fus.map(f=>{
          const d = daysDiff(f.dueDate);
          let badgeClass='later', badgeText=`in ${d} days`;
          if(f.status==='done'){badgeClass='done'; badgeText='Done';}
          else if(d<0){badgeClass='overdue'; badgeText=`${-d} days overdue`;}
          else if(d===0){badgeClass='today'; badgeText='Today';}
          else if(d<=7){badgeClass='week'; badgeText=`in ${d} days`;}
          const typeLabel = escapeHtml(f.type==='Other' && f.customType ? f.customType : f.type);
          return `<div class="fu-item">
            <div class="fu-info">
              <div class="name" style="font-size:13px;">${typeLabel}</div>
              <div class="meta">📅 ${fmtDateShort(f.dueDate)} <span class="badge ${badgeClass}" style="margin-left:6px;">${badgeText}</span>${f.note?`<br>📝 ${escapeHtml(f.note)}`:''}</div>
            </div>
            <div class="fu-actions">
              ${f.status!=='done'?`<button class="btn small" onclick="markDone('${f.id}')">Done</button>`:''}
              <button class="btn small danger" onclick="deleteFU('${f.id}')">Delete</button>
            </div>
          </div>`;
        }).join('')}
        <button class="btn small secondary block" onclick="openFollowupForm('${c.id}')">+ Add Appointment</button>
      </div>`;
    });
  }
  html += `<button class="btn block" onclick="openCaseForm(null,'${pid}')">+ Add New Implant Case</button>`;
  return html;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function countBy(arr, key){
  const m = {};
  arr.forEach(v=>{
    const k = (v[key]||'').trim();

    m[k]=(m[k]||0)+1;
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

const xrayBlobCache = {}; // legacy fileId -> objectURL

// Compress image to base64 (max 1200px wide, JPEG 75%)
function compressImageToDataUrl(file, maxWidth=1200, quality=0.75){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

  // Legacy format: fileId only
  const cached = xrayBlobCache[x.fileId];
  return `<div class="xray-thumb" id="xthumb_${x.id}">
    ${cached
      ? `<img src="${cached}" onclick="openXRayViewer('${key}','${x.fileId}','${escapeHtml(x.fileName)}')">`

    }
    <button class="xray-del" onclick="event.stopPropagation();deleteImplantXRay('${cid}',${implantIdx},'${x.id}','${x.fileId}')">×</button>
  </div>`;

async function loadXRayFromDrive(cid, implantIdx, xid, driveFileId){
  if(!gAccessToken){ showToast('Please sign in to Google first'); return; }
  const el = document.getElementById('xthumb_'+xid);
  if(el){ const ld = el.querySelector('.xray-loading'); if(ld) ld.textContent='⏳'; }
  try{
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{
      headers:{Authorization:'Bearer '+gAccessToken}
    });
    if(resp.status === 401){
      showToast('Session expired — please sign in again');
      if(el){ const ld = el.querySelector('.xray-loading'); if(ld) ld.textContent='☁'; }
      return;
    }
    if(resp.status === 403){
      showToast('Permission denied — try signing out and in again');
      if(el){ const ld = el.querySelector('.xray-loading'); if(ld) ld.textContent='🔒'; }
      return;
    }
    if(resp.status === 404){
      showToast('Image not found on Drive (may have been deleted)');
      if(el){ const ld = el.querySelector('.xray-loading'); if(ld) ld.textContent='❌'; }
      return;
    }
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    xrayBlobCache[driveFileId] = url;
    if(el){
      el.innerHTML = `<img src="${url}" onclick="openXRayViewerCached('${driveFileId}','')">
        <button class="xray-del" onclick="event.stopPropagation();deleteImplantXRay('${cid}',${implantIdx},'${xid}')">×</button>`;
    }
  }catch(e){
    showToast('Load failed: '+e.message);
    if(el){ const ld = el.querySelector('.xray-loading'); if(ld) ld.textContent='❌'; }
  }
}

async function getOrCreateXRayFolder(){
  if(gXRayFolderId) return gXRayFolderId;
  // search for existing folder
  const resp = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${XRAY_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&fields=files(id,name)`,
    {headers:{Authorization:'Bearer '+gAccessToken}}
  );
  const data = await resp.json();
  if(data.files && data.files.length>0){
    gXRayFolderId = data.files[0].id;
    return gXRayFolderId;
  }
  // create folder
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method:'POST',
    headers:{Authorization:'Bearer '+gAccessToken, 'Content-Type':'application/json'},
    body: JSON.stringify({name:XRAY_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder'})
  });
  const folder = await cr.json();
  gXRayFolderId = folder.id;
  return gXRayFolderId;
}

async function driveUploadXRay(file, folderId){
  const boundary = 'xray'+Date.now();
  const metadata = {name:file.name, mimeType:file.type||'image/jpeg', parents:[folderId]};
  const fileData = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });
  // multipart upload
  const metaBytes = new TextEncoder().encode(
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: ${file.type||'image/jpeg'}\r\n\r\n`
  );
  const endBytes = new TextEncoder().encode(`\r\n--${boundary}--`);
  const body = new Uint8Array(metaBytes.byteLength + fileData.byteLength + endBytes.byteLength);
  body.set(metaBytes, 0);
  body.set(new Uint8Array(fileData), metaBytes.byteLength);
  body.set(endBytes, metaBytes.byteLength + fileData.byteLength);

  const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method:'POST',
    headers:{Authorization:'Bearer '+gAccessToken, 'Content-Type':`multipart/related; boundary=${boundary}`},
    body
  });
  const result = await resp.json();
  if(!result.id) throw new Error(result.error?.message||'no id returned');
  return result.id;
}

async function deleteImplantXRay(cid, implantIdx, xid, legacyFileId){
  if(!confirm('Delete this X-ray?')) return;
  const c = getCase(cid);
  if(!c) return;
  const im = (c.implants||[])[implantIdx];
  if(!im) return;
  const x = (im.xrays||[]).find(xr=>xr.id===xid);
  im.xrays = (im.xrays||[]).filter(xr=>xr.id!==xid);
  saveData();
  // Delete from Drive if backed up
  const driveId = (x && (x.driveFileId || x.fileId)) || legacyFileId;
  if(gAccessToken && driveId){
    fetch(`https://www.googleapis.com/drive/v3/files/${driveId}`, {
      method:'DELETE', headers:{Authorization:'Bearer '+gAccessToken}
    }).catch(()=>{});
  }
  const bid = (x && x.fileId) || legacyFileId;
  if(bid && xrayBlobCache[bid]){ URL.revokeObjectURL(xrayBlobCache[bid]); delete xrayBlobCache[bid]; }
  render();
  showToast('X-ray deleted');
}

function saveCase(cid){
  const patientId = document.getElementById('cf_patient').value;
  const clinic = document.getElementById('cf_clinic').value.trim();
  const notes = document.getElementById('cf_notes').value.trim();

  if(!patientId){ showToast('Please select a patient'); return; }

  const implants = [];
  let missingDate = false;
  document.querySelectorAll('#implantItemsWrap .implant-item').forEach(el=>{
    const tooth = el.querySelector('.ii_tooth').value.trim();
    const surgeryDate = el.querySelector('.ii_surgeryDate').value;
    const brand = el.querySelector('.ii_brand').value.trim();
    const diameter = el.querySelector('.ii_diameter').value;
    const length = el.querySelector('.ii_length').value;
    const coverType = el.querySelector('.ii_coverType').value;
    const boneGraft = el.querySelector('.ii_bone').value.trim();
    const membrane = el.querySelector('.ii_membrane').value.trim();
    const stage2Date = el.querySelector('.ii_stage2Date').value;
    const impressionDate = el.querySelector('.ii_impressionDate').value;
    const finalDate = el.querySelector('.ii_finalDate').value;
    const labName = el.querySelector('.ii_labName').value.trim();
    const abutmentType = el.querySelector('.ii_abutmentType').value.trim();
    const crownMaterial = el.querySelector('.ii_crownMaterial').value.trim();
    const labFee = el.querySelector('.ii_labFee').value;
    const extractionDate = el.querySelector('.ii_extractionDate').value;
    const extractionNotes = el.querySelector('.ii_extractionNotes').value.trim();
    const socketPreservation = el.querySelector('.ii_socketPreservation').value.trim();
    const healingNotes = el.querySelector('.ii_healingNotes').value.trim();
    const plannedImplantDate = el.querySelector('.ii_plannedDate').value;
    let xrays = [];
    try{ xrays = JSON.parse(el.querySelector('.ii_xrays').value||'[]'); }catch(e){}
    const hasAnyData = tooth || brand || diameter || length || coverType || boneGraft || membrane || stage2Date || impressionDate || finalDate || labName || abutmentType || crownMaterial || labFee || extractionDate || extractionNotes || socketPreservation || healingNotes || plannedImplantDate;
    if(hasAnyData){
      // surgeryDate required only if no extraction date (i.e. not a pre-stage only record)
      if(!surgeryDate && !extractionDate) missingDate = true;
      implants.push({tooth, surgeryDate, brand, diameter, length, coverType, boneGraft, membrane, stage2Date, impressionDate, finalDate, labName, abutmentType, crownMaterial, labFee, extractionDate, extractionNotes, socketPreservation, healingNotes, plannedImplantDate, xrays});
    }
  });
  if(implants.length===0){ showToast('Please add at least 1 implant site'); return; }
  if(missingDate){ showToast('Please enter extraction date or placement date'); return; }

  if(clinic && !DB.clinics.includes(clinic)) DB.clinics.push(clinic);
  // auto-save new brands and lab names to DB
  implants.forEach(im=>{
    if(im.brand && !DB.brands.includes(im.brand)) DB.brands.push(im.brand);
    if(im.labName && !DB.labNames.includes(im.labName)) DB.labNames.push(im.labName);
  });

  let newCaseId = cid;
  if(cid){
    const c = getCase(cid);
    Object.assign(c, {patientId, clinic, notes, implants});
  }else{
    newCaseId = uid();
    DB.cases.push({id:newCaseId, patientId, clinic, notes, implants, createdAt:todayStr()});
  }
  saveData();
  closeModal();
  if(!cid){
    // suggest adding a follow-up right away
    openFollowupForm(newCaseId, true);
  }else{
    setView('patientDetail', patientId);
    showToast('Case saved');
  }
}

function nextWeekdayFrom(baseIso, days){
  const base = baseIso ? new Date(baseIso) : new Date(todayStr());
  base.setDate(base.getDate()+days);
  return base.getFullYear()+'-'+String(base.getMonth()+1).padStart(2,'0')+'-'+String(base.getDate()).padStart(2,'0');
}
function setFuDate(baseIso, days){
  document.getElementById('fuf_date').value = nextWeekdayFrom(baseIso, days);
}

}

/* ================= EXPORT / IMPORT ================= */
function csvEscape(v){
  v = (v===undefined||v===null) ? '' : String(v);
  if(/[",\n]/.test(v)) v = '"'+v.replace(/"/g,'""')+'"';
  return v;
}
function exportCSV(){
  const rows = [['Patient Name','HN','Phone','Clinic','Tooth Position','Placement Date','Brand','Size(mm)','Closure','Bone Graft','Membrane','Stage II Date','Impression Date','Final Restoration Date','Dental Lab','Abutment Type','Crown Material','Lab Fee','Case Notes','Appointment Type','Appointment Date','Status','Appointment Notes']];
  DB.cases.forEach(c=>{
    const p = getPatient(c.patientId);
    const fus = followupsForCase(c.id);
    const implants = (c.implants && c.implants.length) ? c.implants : [{}];
    implants.forEach(im=>{
      const size = `${im.diameter||''}x${im.length||''}`;
      const stageFields = [im.stage2Date?fmtDateShort(im.stage2Date):'', im.impressionDate?fmtDateShort(im.impressionDate):'', im.finalDate?fmtDateShort(im.finalDate):'', im.labName||'', im.abutmentType||'', im.crownMaterial||'', im.labFee||''];
      if(fus.length===0){
        rows.push([p?p.name:'', p?p.hn:'', p?p.phone:'', c.clinic, im.tooth, fmtDateShort(im.surgeryDate), im.brand, size, im.coverType||'', im.boneGraft, im.membrane, ...stageFields, c.notes, '', '', '', '']);
      }else{
        fus.forEach(f=>{
          const typeLabel = f.type==='Other' && f.customType ? f.customType : f.type;
          rows.push([p?p.name:'', p?p.hn:'', p?p.phone:'', c.clinic, im.tooth, fmtDateShort(im.surgeryDate), im.brand, size, im.coverType||'', im.boneGraft, im.membrane, ...stageFields, c.notes, typeLabel, fmtDateShort(f.dueDate), f.status==='done'?'Done':'Pending', f.note]);
        });
      }
    });
  });
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  downloadBlob(blob, `implant-data-${todayStr()}.csv`);
  showToast('File exported');
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  downloadBlob(blob, `implant-backup-${todayStr()}.json`);
  showToast('Data backed up');
}
function downloadBlob(blob, filename){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 1000);
}
function importJSON(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.patients || !data.cases || !data.followups) throw new Error('invalid');
      if(!confirm('Import will replace all current data. Confirm?')) return;
      DB = {patients:data.patients||[], cases:data.cases||[], followups:data.followups||[], clinics:data.clinics||[]};
      saveData();
      render();
      showToast('Data imported successfully');
    }catch(err){
      showToast('Invalid file');
    }
  };
  reader.readAsText(file);
}

/* ================= GOOGLE DRIVE SYNC ================= */
const DRIVE_FILE_NAME = 'implant-tracker-data.json';
const DRIVE_FOLDER_NAME = 'Implant Tracker';
const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email';
const XRAY_FOLDER_NAME = 'Implant Tracker X-rays';
let gXRayFolderId = null;
let gDataFolderId = null;
let gTokenClient = null;
let gAccessToken = null;
let gUserEmail = null;
let gDriveFileId = null;

function isGoogleConfigured(){
  return typeof GOOGLE_CLIENT_ID !== 'undefined' && !!GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith('YOUR_');
}

function initGoogle(){
  if(!isGoogleConfigured()) return;
  if(typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2){
    setTimeout(initGoogle, 300);
    return;
  }
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: (resp)=>{
      if(resp.error){ showToast('Google sign-in failed'); return; }
      gAccessToken = resp.access_token;
      gDriveFileId = null;
      fetchGoogleUserInfo();
      if(currentView==='settings') render();
      showToast('Signed in to Google');
    }
  });
}

function googleSignIn(){
  if(!gTokenClient){ showToast('Google not ready, please try again'); return; }
  gTokenClient.requestAccessToken();
}

function googleSignOut(){
  if(gAccessToken && typeof google !== 'undefined' && google.accounts){
    google.accounts.oauth2.revoke(gAccessToken, ()=>{});
  }
  gAccessToken = null;
  gUserEmail = null;
  gDriveFileId = null;
  gXRayFolderId = null;
  gDataFolderId = null;
  if(currentView==='settings') render();
  showToast('Signed out of Google');
}

function fetchGoogleUserInfo(){
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers:{Authorization:'Bearer '+gAccessToken}
  }).then(r=>r.json()).then(d=>{
    gUserEmail = d.email || null;
    if(currentView==='settings') render();
  }).catch(()=>{});
}

async function getOrCreateDataFolder(){
  if(gDataFolderId) return gDataFolderId;
  const q = encodeURIComponent(`name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
    headers:{Authorization:'Bearer '+gAccessToken}
  });
  const data = await r.json();
  if(data.files && data.files.length>0){ gDataFolderId = data.files[0].id; return gDataFolderId; }
  const cr = await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{Authorization:'Bearer '+gAccessToken,'Content-Type':'application/json'},
    body: JSON.stringify({name:DRIVE_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder'})
  });
  const folder = await cr.json();
  gDataFolderId = folder.id;
  return gDataFolderId;
}

async function driveFindFile(){
  const folderId = await getOrCreateDataFolder();
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and '${folderId}' in parents and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc`,{
    headers:{Authorization:'Bearer '+gAccessToken}
  });
  if(!r.ok) throw new Error('drive list failed');
  const data = await r.json();
  const f = (data.files||[])[0] || null;
  gDriveFileId = f ? f.id : null;
  return f;
}

async function driveUpload(){
  if(!gAccessToken){ showToast('Please sign in to Google first'); return; }
  showToast('Backing up...');
  try{
    // Step 1: upload all X-ray images that aren't on Drive yet
    const xrayCount = await backupAllXRaysToDrive();

    // Step 2: build DB copy for Drive — strip dataUrls to keep file small
    const dbCopy = JSON.parse(JSON.stringify(DB));
    for(const c of dbCopy.cases||[]){
      for(const im of c.implants||[]){
        for(const x of im.xrays||[]){ delete x.dataUrl; }
      }
    }

    // Step 3: upload JSON to Drive
    await driveFindFile();
    const folderId = await getOrCreateDataFolder();
    const metadata = {name: DRIVE_FILE_NAME, mimeType: 'application/json'};
    if(!gDriveFileId) metadata.parents = [folderId];
    const boundary = 'implanttracker' + Date.now();
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(dbCopy)}\r\n`+
      `--${boundary}--`;
    const url = gDriveFileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${gDriveFileId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const r = await fetch(url, {
      method: gDriveFileId ? 'PATCH' : 'POST',
      headers:{ Authorization:'Bearer '+gAccessToken, 'Content-Type':`multipart/related; boundary=${boundary}` },
      body
    });
    if(!r.ok) throw new Error('upload failed');
    const data = await r.json();
    if(data.id) gDriveFileId = data.id;
    localStorage.setItem('lastSyncUp', new Date().toISOString());
    showToast(xrayCount > 0 ? `Backed up ✓ (${xrayCount} X-ray image(s) uploaded)` : 'Backed up to Google Drive ✓');
    if(currentView==='settings') render();
  }catch(e){
    showToast('Backup failed: '+e.message);
  }
}

async function backupAllXRaysToDrive(){
  let count = 0;
  try{
    const folderId = await getOrCreateXRayFolder();
    for(const c of DB.cases||[]){
      for(const im of c.implants||[]){
        for(const x of (im.xrays||[])){
          if(x.dataUrl && !x.driveFileId){
            const res = await fetch(x.dataUrl);
            const blob = await res.blob();
            const file = new File([blob], x.fileName||'xray.jpg', {type:'image/jpeg'});
            x.driveFileId = await driveUploadXRay(file, folderId);
            count++;
          }
        }
      }
    }
    if(count > 0) saveData();
  }catch(e){ /* skip if Drive not available */ }
  return count;
}

function driveDownload(){
  if(!gAccessToken){ showToast('Please sign in to Google first'); return; }
  showToast('Searching for backup in Google Drive...');
  driveFindFile().then(f=>{
    if(!f){ showToast('No backup found in Google Drive for this account'); return; }
    return fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, {
      headers:{Authorization:'Bearer '+gAccessToken}
    }).then(r=>{
      if(!r.ok) throw new Error('download failed');
      return r.json();
    }).then(data=>{
      if(!data.patients || !data.cases || !data.followups) throw new Error('invalid');
      if(!confirm('Restore will replace all local data with Google Drive data. Confirm?')) return;
      DB = {
        patients:data.patients||[], cases:data.cases||[], followups:data.followups||[],
        clinics:data.clinics||[], brands:data.brands||[], labNames:data.labNames||[]
      };
      saveData();
      localStorage.setItem('lastSyncDown', new Date().toISOString());
      render();
      showToast('Data restored ✓ (tap X-ray images to load from Drive)');
    });
  }).catch(()=>showToast('Restore failed or invalid file'));
}

function renderGoogleSection(){
  if(!isGoogleConfigured()){
    return `<div class="card">
      <h3>${ico('cloud',18)} Google Drive Sync</h3>
      <p style="font-size:13px;color:var(--muted);">Google Client ID not configured for Drive sync. Google Drive<br>
      See setup instructions in <b>SETUP.md</b> in the app folder (one-time setup).</p>
    </div>`;
  }
  if(!gAccessToken){
    return `<div class="card">
      <h3>${ico('cloud',18)} Google Drive Sync</h3>
      <p style="font-size:13px;color:var(--muted);">Sign in with your Google account to backup and restore data via Google Drive.<br>
      Your data is stored privately and separately from other users.</p>
      <button class="btn block" onclick="googleSignIn()">Sign in with Google</button>
    </div>`;
  }
  const lastUp = localStorage.getItem('lastSyncUp');
  const lastDown = localStorage.getItem('lastSyncDown');
  return `<div class="card">
    <h3>${ico('cloud',18)} Google Drive</h3>
    <p style="font-size:13px;color:var(--muted);">Signed in as: <b>${gUserEmail?escapeHtml(gUserEmail):'Loading...'}</b></p>
    ${lastUp?`<p style="font-size:12px;color:var(--muted);margin:2px 0;">Last backup: ${new Date(lastUp).toLocaleString('th-TH')}</p>`:''}
    ${lastDown?`<p style="font-size:12px;color:var(--muted);margin:2px 0;">Last restore: ${new Date(lastDown).toLocaleString('th-TH')}</p>`:''}
    <button class="btn block" onclick="driveUpload()">Backup to Google Drive</button>
    <button class="btn secondary block" onclick="driveDownload()">Restore from Google Drive</button>
    <button class="btn ghost block" onclick="googleSignOut()">Sign out of Google</button>
  </div>`;
}

/* ================= PWA / INIT ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

initGoogle();
render();
</script>
